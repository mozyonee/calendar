name: CD

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install -g @railway/cli
      - run: railway up --ci --service Client
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install -g @railway/cli
      - run: railway up --ci --service Server
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
